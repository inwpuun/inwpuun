      <text x="766" y="246" fill="#8B949E">CI/CD</text>
      <text x="634" y="266" fill="#8B949E">Reliability</text>
      <circle cx="713" cy="262" r="3" fill="#30363D"/>
      <text x="726" y="266" fill="#8B949E">Developer tools</text>
