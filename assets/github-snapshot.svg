    <rect x="64" y="68" width="752" height="2" rx="1" fill="url(#header-line)"/>

    <text x="64" y="55" fill="#F0F6FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">GitHub Snapshot</text>
    <text x="684" y="54" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="500">@inwpuun</text>

    <text x="64" y="106" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Backend systems, financial platforms, and delivery automation.</text>

    <g>
      <rect x="64" y="132" width="170" height="86" rx="8" fill="#0D1117" stroke="#30363D"/>
      <text x="86" y="163" fill="#2F81F7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">25</text>
      <text x="86" y="191" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Public repositories</text>
    </g>

    <g>
