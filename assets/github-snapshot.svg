      <rect x="444" y="132" width="170" height="86" rx="8" fill="#0D1117" stroke="#30363D"/>
      <text x="466" y="163" fill="#F2CC60" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">2022</text>
      <text x="466" y="191" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Active since</text>
