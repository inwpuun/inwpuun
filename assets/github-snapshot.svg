<svg width="880" height="300" viewBox="0 0 880 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub snapshot for inwpuun</title>
  <desc id="desc">A modern dark GitHub profile snapshot showing 25 public repositories, 14 followers, backend system focus, and primary stack Java, Go, TypeScript, SQL, and PostgreSQL.</desc>

  <defs>
    <linearGradient id="header-line" x1="64" y1="76" x2="816" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2F81F7"/>
      <stop offset="0.55" stop-color="#3FB950"/>
      <stop offset="1" stop-color="#F2CC60"/>
    </linearGradient>
    <linearGradient id="panel-fill" x1="40" y1="24" x2="840" y2="276" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111820"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <filter id="soft-shadow" x="20" y="4" width="840" height="292" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#010409" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="880" height="300" rx="0" fill="#0D1117"/>

  <g filter="url(#soft-shadow)">
