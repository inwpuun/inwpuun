      <text x="276" y="163" fill="#3FB950" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">14</text>
      <text x="276" y="191" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Followers</text>
    </g>

